<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Manajemen Dokumen</title>

    <!-- Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --paper: #EEF3F8;
            --panel: #FCFDFF;
            --ink: #1C2B4A;
            --ink-soft: #4A5C7F;
            --line: #B9C6D9;
            --line-soft: #D8E1EC;
            --accent: #C98A1E;
            --annotate: #B5502A;
            --focus: #2F6FED;
            --ok: #2E8B57;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            background:
                linear-gradient(var(--line-soft) 1px, transparent 1px),
                linear-gradient(90deg, var(--line-soft) 1px, transparent 1px),
                var(--paper);
            background-size: 28px 28px, 28px 28px, auto;
            font-family: "IBM Plex Sans", sans-serif;
            color: var(--ink);
            padding: 40px 20px 60px;
        }

        .wrap {
            width: 100%;
            max-width: 860px;
            margin: 0 auto;
        }

        /* ---- Panel dasar bergaya lembar gambar teknik ---- */

        .sheet {
            position: relative;
            background: var(--panel);
            border: 1px solid var(--ink);
            box-shadow: 6px 6px 0 rgba(28, 43, 74, 0.08);
            margin-bottom: 30px;
        }

        .reg-mark {
            position: absolute;
            width: 14px;
            height: 14px;
            pointer-events: none;
        }
        .reg-mark::before,
        .reg-mark::after {
            content: "";
            position: absolute;
            background: var(--ink);
        }
        .reg-mark::before { width: 100%; height: 1px; top: 50%; left: 0; }
        .reg-mark::after  { width: 1px; height: 100%; left: 50%; top: 0; }
        .reg-mark.tl { top: -7px; left: -7px; }
        .reg-mark.tr { top: -7px; right: -7px; }
        .reg-mark.bl { bottom: -7px; left: -7px; }
        .reg-mark.br { bottom: -7px; right: -7px; }

        .sheet-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 18px 26px;
            border-bottom: 1px solid var(--ink);
        }

        .sheet-head .eyebrow {
            font-family: "IBM Plex Mono", monospace;
            font-size: 11px;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--ink-soft);
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 6px;
        }

        .sheet-head .eyebrow .dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--ok);
            box-shadow: 0 0 0 3px rgba(46, 139, 87, 0.18);
            flex-shrink: 0;
        }

        .sheet-head h1,
        .sheet-head h2 {
            font-family: "IBM Plex Mono", monospace;
            font-size: 18px;
            font-weight: 600;
            margin: 0;
        }

        .sheet-body {
            padding: 24px 26px 26px;
        }

        /* ---- Info pengguna ---- */

        .userinfo {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }

        .userinfo dt {
            font-family: "IBM Plex Mono", monospace;
            font-size: 10.5px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--ink-soft);
            margin: 0 0 6px;
        }

        .userinfo dd {
            margin: 0;
            font-size: 15px;
        }

        .tag {
            display: inline-block;
            font-family: "IBM Plex Mono", monospace;
            font-size: 11px;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            padding: 3px 10px;
            border: 1px solid var(--accent);
            color: var(--accent);
        }

        /* ---- Form ---- */

        .field {
            margin-bottom: 18px;
        }

        .field label {
            display: block;
            font-family: "IBM Plex Mono", monospace;
            font-size: 11px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--ink-soft);
            margin-bottom: 7px;
        }

        .field input[type="text"],
        .field textarea {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--line);
            background: var(--paper);
            font-family: "IBM Plex Sans", sans-serif;
            font-size: 14.5px;
            color: var(--ink);
            outline: none;
            resize: vertical;
            transition: border-color 0.15s ease;
        }

        .field input[type="text"]:focus,
        .field textarea:focus {
            border-color: var(--focus);
        }

        .field input::placeholder,
        .field textarea::placeholder {
            color: #9AA9C2;
        }

        .actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        /* ---- Tombol umum (dipakai statis & oleh dokumen.js) ---- */

        .btn,
        button.btn {
            font-family: "IBM Plex Mono", monospace;
            font-size: 11.5px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            text-decoration: none;
            padding: 10px 16px;
            border: 1px solid var(--ink);
            background: transparent;
            color: var(--ink);
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: background 0.15s ease, color 0.15s ease, transform 0.05s ease;
        }

        .btn:active { transform: translateY(1px); }

        .btn:focus-visible {
            outline: 2px solid var(--focus);
            outline-offset: 2px;
        }

        .btn-sm { padding: 6px 10px; font-size: 10px; }

        /* varian statis */
        .btn-primary { background: var(--ink); color: var(--paper); border-color: var(--ink); }
        .btn-primary:hover { background: var(--accent); border-color: var(--accent); }

        .btn-accent { background: var(--accent); color: var(--panel); border-color: var(--accent); }
        .btn-accent:hover { opacity: 0.88; }

        .btn-outline { background: transparent; color: var(--ink-soft); border-color: var(--line); }
        .btn-outline:hover { border-color: var(--ink); color: var(--ink); }

        .btn-focus { background: transparent; color: var(--focus); border-color: var(--focus); }
        .btn-focus:hover { background: var(--focus); color: var(--panel); }

        .btn-ghost-danger { background: transparent; color: var(--annotate); border-color: var(--annotate); }
        .btn-ghost-danger:hover { background: var(--annotate); color: var(--panel); }

        /* varian yang dipakai oleh dokumen.js (nama class tidak diubah) */
        .btn-warning { border-color: var(--accent); color: var(--accent); }
        .btn-warning:hover { background: var(--accent); color: var(--panel); }

        .btn-danger { border-color: var(--annotate); color: var(--annotate); }
        .btn-danger:hover { background: var(--annotate); color: var(--panel); }

        /* ---- Tabel dokumen ---- */

        .table-wrap {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        thead th {
            font-family: "IBM Plex Mono", monospace;
            font-size: 10.5px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            text-align: left;
            background: var(--ink);
            color: var(--paper);
            padding: 10px 12px;
            font-weight: 500;
        }

        tbody td {
            padding: 12px;
            border-bottom: 1px dashed var(--line);
            vertical-align: top;
        }

        tbody tr:hover td {
            background: var(--line-soft);
        }

        .text-center {
            text-align: center;
            color: var(--ink-soft);
            font-family: "IBM Plex Mono", monospace;
            font-size: 12px;
            letter-spacing: 0.05em;
            padding: 22px 0 !important;
        }

        @media (max-width: 620px) {
            .userinfo { grid-template-columns: 1fr; gap: 14px; }
            .sheet-body { padding: 20px 18px 22px; }
            .sheet-head { padding: 16px 18px; flex-direction: column; align-items: flex-start; }
        }
    </style>
    <link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="wrap">

    <!-- Header / Info Pengguna -->

    <div class="sheet">

        <span class="reg-mark tl"></span>
        <span class="reg-mark tr"></span>
        <span class="reg-mark bl"></span>
        <span class="reg-mark br"></span>

        <div class="sheet-head">
            <div>
                <div class="eyebrow"><span class="dot"></span> Sesi Aktif</div>
                <h1>Manajemen Dokumen</h1>
            </div>

            <button
                id="btnLogout"
                class="btn btn-ghost-danger btn-sm">

                Logout

            </button>

        </div>

        <div class="sheet-body">

            <dl class="userinfo">

                <div>
                    <dt>Nama</dt>
                    <dd id="namaUser">-</dd>
                </div>

                <div>
                    <dt>Email</dt>
                    <dd id="emailUser">-</dd>
                </div>

                <div>
                    <dt>Role</dt>
                    <dd><span id="roleUser" class="tag">-</span></dd>
                </div>

            </dl>

        </div>

    </div>

    <!-- Form -->

    <div class="sheet">

        <span class="reg-mark tl"></span>
        <span class="reg-mark tr"></span>
        <span class="reg-mark bl"></span>
        <span class="reg-mark br"></span>

        <div class="sheet-head">
            <h2>Form Dokumen</h2>
        </div>

        <div class="sheet-body">

            <input
                type="hidden"
                id="dokumenId">

            <div class="field">

                <label for="judul">Judul Dokumen</label>

                <input
                    type="text"
                    id="judul"
                    placeholder="Masukkan judul">

            </div>

            <div class="field">

                <label for="isi">Isi Dokumen</label>

                <textarea
                    id="isi"
                    rows="5"
                    placeholder="Masukkan isi dokumen"></textarea>

            </div>

            <div class="actions">

                <button
                    id="btnSimpan"
                    class="btn btn-primary">

                    Simpan

                </button>

                <button
                    id="btnUpdate"
                    class="btn btn-accent"
                    style="display:none">

                    Update

                </button>

                <button
                    id="btnBatal"
                    class="btn btn-outline"
                    style="display:none">

                    Batal

                </button>

                <button
                    id="btnRefresh"
                    class="btn btn-focus">

                    Refresh

                </button>

            </div>

        </div>

    </div>

    <!-- Tabel -->

    <div class="sheet">

        <span class="reg-mark tl"></span>
        <span class="reg-mark tr"></span>
        <span class="reg-mark bl"></span>
        <span class="reg-mark br"></span>

        <div class="sheet-head">
            <h2>Daftar Dokumen</h2>

            <a
                href="dashboard.html"
                class="btn btn-outline btn-sm">

                Dashboard

            </a>

        </div>

        <div class="sheet-body">

            <div class="table-wrap">

                <table>

                    <thead>

                        <tr>

                            <th width="50">No</th>

                            <th>Judul</th>

                            <th>Isi</th>

                            <th width="170">

                                Aksi

                            </th>

                        </tr>

                    </thead>

                    <tbody id="tabelDokumen">

                        <tr>

                            <td colspan="4" class="text-center">

                                Memuat data...

                            </td>

                        </tr>

                    </tbody>

                </table>

            </div>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.8/dist/umd/supabase.min.js"></script>

<script src="js/config.js"></script>

<script src="js/dokumen.js"></script>

<script src="js/auth.js"></script>

</body>

</html>
